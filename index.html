<!DOCTYPE html>
<html>
<head>
<title>Universe Explorer MAX</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

/* LEFT UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

/* RIGHT VERSION LABEL */
#version {
  position:absolute;
  top:10px;
  right:10px;
  color:white;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>
<body>

<div id="ui">
<b>Universe Explorer MAX</b><br>
WASD = Move | Shift = Boost<br>
Click = Lock Mouse / Look Around<br>
ESC = Unlock Mouse<br>
Click Planet = Travel<br>
</div>

<div id="version">V1</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== SETUP =====
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100000);
camera.position.set(0,0,800);

let renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:"low-power" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404040));

// ===== TEXTURES =====
let loader = new THREE.TextureLoader();
function tex(u){ return loader.load(u); }

const T = {
  sun: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/sun.jpg"),
  earth: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg"),
  moon: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/moon_1024.jpg"),
  mars: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/mars_1024.jpg"),
  jupiter: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/jupiter.jpg"),
  saturn: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/saturn.jpg"),
  ring: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/saturnringcolor.jpg"),
  mercury: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/mercury.jpg"),
  venus: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/venus.jpg"),
  uranus: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/uranus.jpg"),
  neptune: tex("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/neptune.jpg")
};

// ===== STARS =====
let geo = new THREE.BufferGeometry();
let arr = new Float32Array(1500*3);
for(let i=0;i<1500;i++){
  arr[i*3]=(Math.random()-0.5)*10000;
  arr[i*3+1]=(Math.random()-0.5)*10000;
  arr[i*3+2]=(Math.random()-0.5)*10000;
}
geo.setAttribute("position", new THREE.BufferAttribute(arr,3));
scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:1})));

// ===== SOLAR SYSTEM =====
let system = new THREE.Group();
scene.add(system);
let objects = {};

function make(name,size,dist,map,pop){
  let orbit = new THREE.Group();
  system.add(orbit);

  let mesh = new THREE.Mesh(
    new THREE.SphereGeometry(size,32,32),
    new THREE.MeshStandardMaterial({map})
  );

  mesh.position.x = dist;
  mesh.userData = {name,population:pop};
  orbit.add(mesh);
  objects[name]=mesh;

  return orbit;
}

let sun = new THREE.Mesh(
  new THREE.SphereGeometry(40,32,32),
  new THREE.MeshBasicMaterial({map:T.sun})
);
system.add(sun);
system.add(new THREE.PointLight(0xffffff,3));

let mercury = make("Mercury",5,70,T.mercury,0);
let venus   = make("Venus",9,100,T.venus,0);
let earthO  = make("Earth",12,140,T.earth,8000000000);
let mars    = make("Mars",8,180,T.mars,0);
let jupiter = make("Jupiter",25,260,T.jupiter,0);
let saturn  = make("Saturn",22,340,T.saturn,0);
let uranus  = make("Uranus",18,420,T.uranus,0);
let neptune = make("Neptune",18,500,T.neptune,0);

// MOON
let moonOrbit = new THREE.Group();
objects["Earth"].add(moonOrbit);

let moon = new THREE.Mesh(
  new THREE.SphereGeometry(4,16,16),
  new THREE.MeshStandardMaterial({map:T.moon})
);
moon.position.x = 25;
moon.userData={name:"Moon",population:0};
moonOrbit.add(moon);
objects["Moon"]=moon;

// SATURN RINGS
let ring = new THREE.Mesh(
  new THREE.RingGeometry(30,45,32),
  new THREE.MeshBasicMaterial({map:T.ring, side:THREE.DoubleSide, transparent:true})
);
ring.rotation.x=Math.PI/2;
objects["Saturn"].add(ring);

// ===== POINTER LOCK CAMERA =====
let yaw=0, pitch=0;

document.body.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    camera.rotation.set(pitch, yaw, 0);
  }
});

// ===== CONTROLS =====
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== CLICK TRAVEL =====
let ray=new THREE.Raycaster(),mouse=new THREE.Vector2(),target=null;

window.addEventListener("mousedown",()=>{
  if(document.pointerLockElement !== document.body) return;

  ray.setFromCamera({x:0,y:0},camera);
  let hit=ray.intersectObjects(Object.values(objects),true);

  if(hit.length){
    let p=new THREE.Vector3();
    hit[0].object.getWorldPosition(p);
    target=p.add(new THREE.Vector3(0,0,80));
  }
});

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);

// MOVE
let speed=keys["Shift"]?20:5;
if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

// TRAVEL
if(target){
  camera.position.lerp(target,0.05);
  if(camera.position.distanceTo(target)<1) target=null;
}

// ORBITS
[mercury,venus,earthO,mars,jupiter,saturn,uranus,neptune].forEach((o,i)=>{
  o.rotation.y+=0.002+i*0.0005;
});
moonOrbit.rotation.y+=0.01;

renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
