<!DOCTYPE html>
<html>
<head>
<title>Universe Explorer</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>
<body>

<div id="ui">
<b>Universe Explorer</b><br>
WASD = Move | Shift = Boost<br>
Scroll = Zoom<br>
Auto Save ✔
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== SCENE =====
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100000);
camera.position.set(0,0,800);

let renderer = new THREE.WebGLRenderer({
  antialias:false,
  powerPreference:"low-power"
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x404040));

// ===== STARFIELD =====
let starGeo = new THREE.BufferGeometry();
let starCount = 2500;
let positions = new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
  positions[i*3] = (Math.random()-0.5)*10000;
  positions[i*3+1] = (Math.random()-0.5)*10000;
  positions[i*3+2] = (Math.random()-0.5)*10000;
}

starGeo.setAttribute("position", new THREE.BufferAttribute(positions,3));
let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:1}));
scene.add(stars);

// ===== RANDOM PLANETS =====
let planets = [];

function createPlanet(pos){
  let group = new THREE.Group();

  let low = new THREE.Mesh(
    new THREE.SphereGeometry(10,8,8),
    new THREE.MeshBasicMaterial({color:0x4444ff})
  );

  let high = new THREE.Mesh(
    new THREE.SphereGeometry(10,32,32),
    new THREE.MeshStandardMaterial({
      color:new THREE.Color(Math.random(),Math.random(),Math.random()),
      roughness:1
    })
  );

  let atm = new THREE.Mesh(
    new THREE.SphereGeometry(12,16,16),
    new THREE.MeshBasicMaterial({
      color:0x3399ff,
      transparent:true,
      opacity:0.15
    })
  );

  high.add(atm);

  group.add(low);
  group.add(high);
  high.visible = false;

  group.position.copy(pos);
  group.userData.population = Math.floor(Math.random()*1000000000);

  scene.add(group);
  planets.push({group,low,high});
}

for(let i=0;i<15;i++){
  createPlanet(new THREE.Vector3(
    Math.random()*3000-1500,
    Math.random()*3000-1500,
    Math.random()*3000-1500
  ));
}

// ===== REAL SOLAR SYSTEM =====
function createSolarSystem(pos){
  let system = new THREE.Group();
  system.position.copy(pos);
  scene.add(system);

  // SUN
  let sun = new THREE.Mesh(
    new THREE.SphereGeometry(40,32,32),
    new THREE.MeshBasicMaterial({color:0xffcc00})
  );
  system.add(sun);

  let light = new THREE.PointLight(0xffffff,3);
  system.add(light);

  // EARTH
  let earthOrbit = new THREE.Group();
  system.add(earthOrbit);

  let earth = new THREE.Mesh(
    new THREE.SphereGeometry(12,32,32),
    new THREE.MeshStandardMaterial({color:0x2266ff})
  );
  earth.position.x = 120;
  earthOrbit.add(earth);
  earth.userData.population = 8000000000;

  let earthAtm = new THREE.Mesh(
    new THREE.SphereGeometry(14,32,32),
    new THREE.MeshBasicMaterial({
      color:0x3399ff,
      transparent:true,
      opacity:0.2
    })
  );
  earth.add(earthAtm);

  // MARS
  let marsOrbit = new THREE.Group();
  system.add(marsOrbit);

  let mars = new THREE.Mesh(
    new THREE.SphereGeometry(8,32,32),
    new THREE.MeshStandardMaterial({color:0xff5533})
  );
  mars.position.x = 200;
  marsOrbit.add(mars);
  mars.userData.population = 0;

  system.userData = {
    earthOrbit,
    marsOrbit,
    earth,
    mars
  };

  return system;
}

let solarSystem = createSolarSystem(new THREE.Vector3(0,0,0));

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let zoom = 0;
window.addEventListener("wheel",e=>{
  zoom += e.deltaY*0.001;
  zoom = Math.max(-5,Math.min(5,zoom));
});

// ===== SAVE =====
function save(){
  localStorage.setItem("spaceSave", JSON.stringify(camera.position));
}
function load(){
  let s = JSON.parse(localStorage.getItem("spaceSave"));
  if(s) camera.position.set(s.x,s.y,s.z);
}
load();
setInterval(save,5000);

// ===== LABEL =====
let label = document.createElement("div");
label.style.position="absolute";
label.style.color="white";
document.body.appendChild(label);

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
let speed = keys["Shift"] ? 20 : 5;

if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

// ZOOM
if(zoom < -2) camera.position.z = 3000;
else if(zoom < 0) camera.position.z = 1500;
else if(zoom < 2) camera.position.z = 500;
else camera.position.z = 100;

// STAR ROTATION
stars.rotation.y += 0.0002;

// SOLAR SYSTEM ORBITS
solarSystem.userData.earthOrbit.rotation.y += 0.01;
solarSystem.userData.marsOrbit.rotation.y += 0.008;

// LOD + CLOSEST
let closest = null;
let minDist = Infinity;

// RANDOM PLANETS
planets.forEach(p=>{
  let d = camera.position.distanceTo(p.group.position);

  if(d < 200){
    p.low.visible = false;
    p.high.visible = true;
  } else {
    p.low.visible = true;
    p.high.visible = false;
  }

  if(d < minDist){
    minDist = d;
    closest = p.group;
  }
});

// EARTH + MARS
[solarSystem.userData.earth, solarSystem.userData.mars].forEach(obj=>{
  let pos = obj.getWorldPosition(new THREE.Vector3());
  let d = camera.position.distanceTo(pos);

  if(d < minDist){
    minDist = d;
    closest = obj;
  }
});

// LABEL
if(closest){
  let pos = closest.getWorldPosition
    ? closest.getWorldPosition(new THREE.Vector3())
    : closest.position;

  let v = pos.project(camera);

  label.style.left = ((v.x*0.5+0.5)*innerWidth)+"px";
  label.style.top = ((-v.y*0.5+0.5)*innerHeight)+"px";

  let name = "Planet";
  if(closest === solarSystem.userData.earth) name = "Earth";
  if(closest === solarSystem.userData.mars) name = "Mars";

  label.innerHTML = name + "<br>Population: " +
    (closest.userData.population || 0).toLocaleString();
}

// RENDER
renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
