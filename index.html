<!DOCTYPE html>
<html>
<head>
<title>Universe Explorer</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>
<body>

<div id="ui">
<b>Universe Explorer</b><br>
WASD = Move | Shift = Boost<br>
Scroll = Zoom<br>
Click = Travel / Investigate<br>
Auto Save ✔
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== SETUP =====
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100000);
camera.position.set(0,0,800);

let renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:"low-power" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x404040));

// ===== STARFIELD =====
let starGeo = new THREE.BufferGeometry();
let starCount = 2500;
let positions = new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
  positions[i*3]=(Math.random()-0.5)*10000;
  positions[i*3+1]=(Math.random()-0.5)*10000;
  positions[i*3+2]=(Math.random()-0.5)*10000;
}
starGeo.setAttribute("position", new THREE.BufferAttribute(positions,3));

let stars = new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:1}));
scene.add(stars);

// ===== RANDOM PLANETS =====
let planets = [];

function createPlanet(pos){
  let mesh = new THREE.Mesh(
    new THREE.SphereGeometry(10,16,16),
    new THREE.MeshStandardMaterial({
      color:new THREE.Color(Math.random(),Math.random(),Math.random())
    })
  );

  mesh.position.copy(pos);
  mesh.userData = {
    name:"Planet",
    population: Math.floor(Math.random()*1000000000)
  };

  scene.add(mesh);
  planets.push(mesh);
}

for(let i=0;i<15;i++){
  createPlanet(new THREE.Vector3(
    Math.random()*3000-1500,
    Math.random()*3000-1500,
    Math.random()*3000-1500
  ));
}

// ===== FULL SOLAR SYSTEM =====
function createSolarSystem(pos){
  let system = new THREE.Group();
  system.position.copy(pos);
  scene.add(system);

  let objects = {};

  let sun = new THREE.Mesh(
    new THREE.SphereGeometry(40,32,32),
    new THREE.MeshBasicMaterial({color:0xffcc00})
  );
  sun.userData = {name:"Sun", population:0};
  system.add(sun);

  let light = new THREE.PointLight(0xffffff,3);
  system.add(light);

  function createPlanet(name,size,dist,color,pop){
    let orbit = new THREE.Group();
    system.add(orbit);

    let mesh = new THREE.Mesh(
      new THREE.SphereGeometry(size,32,32),
      new THREE.MeshStandardMaterial({color})
    );

    mesh.position.x = dist;
    mesh.userData = {name,population:pop};

    orbit.add(mesh);
    objects[name] = mesh;

    return orbit;
  }

  let mercury = createPlanet("Mercury",5,70,0xaaaaaa,0);
  let venus   = createPlanet("Venus",9,100,0xffcc88,0);
  let earthO  = createPlanet("Earth",12,140,0x2266ff,8000000000);
  let mars    = createPlanet("Mars",8,180,0xff5533,0);
  let jupiter = createPlanet("Jupiter",25,260,0xffaa88,0);
  let saturn  = createPlanet("Saturn",22,340,0xffddaa,0);
  let uranus  = createPlanet("Uranus",18,420,0x66ccff,0);
  let neptune = createPlanet("Neptune",18,500,0x3366ff,0);

  // Moon
  let moonOrbit = new THREE.Group();
  objects["Earth"].add(moonOrbit);

  let moon = new THREE.Mesh(
    new THREE.SphereGeometry(4,16,16),
    new THREE.MeshStandardMaterial({color:0xaaaaaa})
  );
  moon.position.x = 25;
  moon.userData = {name:"Moon", population:0};
  moonOrbit.add(moon);
  objects["Moon"] = moon;

  // Saturn Rings
  let ring = new THREE.Mesh(
    new THREE.RingGeometry(30,45,32),
    new THREE.MeshBasicMaterial({color:0xddddaa, side:THREE.DoubleSide})
  );
  ring.rotation.x = Math.PI/2;
  objects["Saturn"].add(ring);

  system.userData = {
    objects,
    orbits:[mercury,venus,earthO,mars,jupiter,saturn,uranus,neptune],
    moonOrbit
  };

  return system;
}

let solarSystem = createSolarSystem(new THREE.Vector3(0,0,0));

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== CLICK TELEPORT =====
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let targetPosition = null;

window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);

  let objects = [...planets, ...Object.values(solarSystem.userData.objects)];
  let intersects = raycaster.intersectObjects(objects,true);

  if(intersects.length>0){
    let obj = intersects[0].object;
    let pos = new THREE.Vector3();
    obj.getWorldPosition(pos);

    targetPosition = pos.clone().add(new THREE.Vector3(0,0,80));
  }
});

// ===== SAVE =====
function save(){
  localStorage.setItem("spaceSave", JSON.stringify(camera.position));
}
function load(){
  let s = JSON.parse(localStorage.getItem("spaceSave"));
  if(s) camera.position.set(s.x,s.y,s.z);
}
load();
setInterval(save,5000);

// ===== LABEL =====
let label = document.createElement("div");
label.style.position="absolute";
label.style.color="white";
document.body.appendChild(label);

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
let speed = keys["Shift"] ? 20 : 5;

if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

// SMOOTH TRAVEL
if(targetPosition){
  camera.position.lerp(targetPosition,0.05);
  if(camera.position.distanceTo(targetPosition)<1){
    targetPosition=null;
  }
}

// ORBITS
solarSystem.userData.orbits.forEach((o,i)=>{
  o.rotation.y += 0.002 + i*0.0005;
});
solarSystem.userData.moonOrbit.rotation.y += 0.01;

// FIND CLOSEST OBJECT
let closest=null;
let minDist=Infinity;

let allObjects = [...planets, ...Object.values(solarSystem.userData.objects)];

allObjects.forEach(obj=>{
  let pos = obj.getWorldPosition(new THREE.Vector3());
  let d = camera.position.distanceTo(pos);

  if(d<minDist){
    minDist=d;
    closest=obj;
  }
});

// LABEL
if(closest){
  let pos = closest.getWorldPosition(new THREE.Vector3());
  let v = pos.project(camera);

  label.style.left=((v.x*0.5+0.5)*innerWidth)+"px";
  label.style.top=(( -v.y*0.5+0.5)*innerHeight)+"px";

  label.innerHTML =
    (closest.userData.name || "Planet") +
    "<br>Population: " +
    (closest.userData.population || 0).toLocaleString();
}

// RENDER
renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
